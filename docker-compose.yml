services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./database.db

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Ważne dla wydajności na Windows
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api